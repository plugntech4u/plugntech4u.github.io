name: Daily Tech Update

on:
  schedule:
    # Runs every day at 2:30 AM UTC = 8:00 AM IST
    - cron: '30 2 * * *'

  # Allow manual trigger from GitHub Actions tab anytime
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-tech-page:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate and inject daily tech update
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python generate_update.py

      - name: Commit updated tech-updates.html
        run: |
          git config user.name  "PlugNTech Bot"
          git config user.email "bot@plugntech4u.github.io"
          git add tech-updates.html
          git diff --cached --quiet || git commit -m "🤖 Auto: Daily tech update $(date +'%d %b %Y')"
          git push
